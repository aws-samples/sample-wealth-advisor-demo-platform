# TODO: No tests exist yet — re-enable coverage and reporting when real tests are added
[tool.pytest.ini_options]

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_market_events_coordinator" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[tool.uv.sources]
wealth-management-portal-common-market-events = { workspace = true, editable = true }
"wealth_management_portal.common_auth" = { workspace = true }

[project]
name = "wealth_management_portal.market_events_coordinator"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "wealth_management_portal.common_auth",
  "aws-opentelemetry-distro==0.15.0",
  "bedrock-agentcore==0.1.7",
  "fastapi==0.128.5",
  "boto3==1.42.44",
  "mcp==1.26.0",
  "strands-agents==1.25.0",
  "strands-agents-tools==0.2.20",
  "uvicorn==0.40.0",
  "wealth-management-portal-common-market-events",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [ "fastapi[standard]==0.128.5" ]
