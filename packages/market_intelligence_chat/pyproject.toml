[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_market_intelligence_chat" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/market_intelligence_chat/html'
 --cov-report xml:'../../coverage/packages/market_intelligence_chat/coverage.xml'
 --html='../../reports/packages/market_intelligence_chat/unittests/html/index.html'
 --junitxml='../../reports/packages/market_intelligence_chat/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_market_intelligence_chat" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[tool.uv.sources]
wealth-management-portal-common-market-events = { workspace = true, editable = true }
wealth-management-portal-market-events-coordinator = { workspace = true, editable = true }
"wealth_management_portal.common_auth" = { workspace = true }

[project]
name = "wealth_management_portal.market_intelligence_chat"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "wealth_management_portal.common_auth",
  "aws-opentelemetry-distro==0.15.0",
  "bedrock-agentcore==0.1.7",
  "fastapi==0.128.5",
  "boto3==1.42.44",
  "mcp==1.26.0",
  "strands-agents==1.25.0",
  "strands-agents-tools==0.2.20",
  "uvicorn==0.40.0",
  "yfinance>=1.2.0",
  "pandas>=3.0.1",
  "numpy>=2.4.2",
  "wealth-management-portal-common-market-events",
  "wealth-management-portal-market-events-coordinator",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [ "fastapi[standard]==0.128.5" ]
