[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_portfolio_data_access" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --ignore=tests/integration
 --cov
 --cov-report html:'../../coverage/packages/portfolio_data_access/html'
 --cov-report xml:'../../coverage/packages/portfolio_data_access/coverage.xml'
 --html='../../reports/packages/portfolio_data_access/unittests/html/index.html'
 --junitxml='../../reports/packages/portfolio_data_access/unittests/junit.xml'
"""
markers = [
  "integration: marks tests as integration tests (deselect with '-m \"not integration\"')"
]

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_portfolio_data_access" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.black]
line-length = 120

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "wealth_management_portal.portfolio_data_access"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "pydantic>=2.12.5",
  "redshift-connector>=2.1.0",
  "boto3==1.42.44"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
