[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_portfolio_data_server" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/portfolio_data_server/html'
 --cov-report xml:'../../coverage/packages/portfolio_data_server/coverage.xml'
 --html='../../reports/packages/portfolio_data_server/unittests/html/index.html'
 --junitxml='../../reports/packages/portfolio_data_server/unittests/junit.xml'
 --ignore=tests/integration
"""
markers = [
  "integration: marks tests as integration tests (deselect with '-m \"not integration\"')"
]

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_portfolio_data_server" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[tool.uv.sources.wealth-management-portal-portfolio-data-access]
workspace = true

[project]
name = "wealth_management_portal.portfolio_data_server"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "mcp==1.26.0",
  "boto3==1.42.44",
  "wealth-management-portal-portfolio-data-access",
  "aws-lambda-powertools==3.24.0",
  "aws-lambda-powertools[tracer]==3.24.0",
  "aws-lambda-powertools[parser]==3.24.0",
  "sqlalchemy>=1.4.54"
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = []
