[tool.hatch.build.targets.wheel]
packages = ["common_auth"]

[tool.hatch.metadata]
allow-direct-references = true

[project]
name = "wealth_management_portal.common_auth"
version = "1.0.0"
description = "Shared SigV4 HTTPX auth for Bedrock AgentCore clients."
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "botocore>=1.35.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
