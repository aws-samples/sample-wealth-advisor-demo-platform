[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_neptune_analytics_server" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/neptune_analytics_server/html'
 --cov-report xml:'../../coverage/packages/neptune_analytics_server/coverage.xml'
 --html='../../reports/packages/neptune_analytics_server/unittests/html/index.html'
 --junitxml='../../reports/packages/neptune_analytics_server/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_neptune_analytics_server" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "wealth_management_portal.neptune_analytics_server"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "mcp==1.26.0",
  "boto3==1.42.44",
  "aws-opentelemetry-distro==0.15.0",
  "wealth-management-portal-neptune-analytics-core"
]

[tool.uv.sources]
wealth-management-portal-neptune-analytics-core = { workspace = true }

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
