[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_scheduler_tools" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../../coverage/packages/scheduler-tools/scheduler_tools/html'
 --cov-report xml:'../../../coverage/packages/scheduler-tools/scheduler_tools/coverage.xml'
 --html='../../../reports/packages/scheduler-tools/scheduler_tools/unittests/html/index.html'
 --junitxml='../../../reports/packages/scheduler-tools/scheduler_tools/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_scheduler_tools" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "wealth_management_portal.scheduler_tools"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "aws-lambda-powertools==3.24.0",
  "aws-lambda-powertools[tracer]==3.24.0",
  "aws-lambda-powertools[parser]==3.24.0",
  "wealth_management_portal.portfolio_data_access",
  "wealth_management_portal.common_auth",
  "mcp",
  "httpx",
  "strands-agents",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[tool.uv.sources]
"wealth_management_portal.common_auth" = { workspace = true }
