[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_common_market_events" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../../coverage/packages/common_market_events/common_market_events/html'
 --cov-report xml:'../../../coverage/packages/common_market_events/common_market_events/coverage.xml'
 --html='../../../reports/packages/common_market_events/common_market_events/unittests/html/index.html'
 --junitxml='../../../reports/packages/common_market_events/common_market_events/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_common_market_events" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "wealth_management_portal.common_market_events"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
 "boto3>=1.42.44",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
