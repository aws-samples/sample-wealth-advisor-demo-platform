# TODO: No tests exist yet — re-enable coverage and reporting when real tests are added
[tool.pytest.ini_options]

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_neptune_analytics_core" ]
artifacts = [ "wealth_management_portal_neptune_analytics_core/graph_config.yaml" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[project]
name = "wealth_management_portal.neptune_analytics_core"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [ "boto3==1.42.44", "pyyaml>=6.0" ]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"
