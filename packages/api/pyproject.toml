[tool.coverage.run]
branch = true
source = [ "wealth_management_portal_api" ]

[tool.coverage.report]
exclude_lines = [ "if TYPE_CHECKING:" ]
show_missing = true

[tool.pytest.ini_options]
addopts = """
 --cov
 --cov-report html:'../../coverage/packages/api/html'
 --cov-report xml:'../../coverage/packages/api/coverage.xml'
 --html='../../reports/packages/api/unittests/html/index.html'
 --junitxml='../../reports/packages/api/unittests/junit.xml'
"""

[tool.hatch.build.targets.wheel]
packages = [ "wealth_management_portal_api" ]

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff]
exclude = [ ".ruff_cache", ".svn", ".tox", ".venv", "dist" ]
line-length = 120
indent-width = 4

  [tool.ruff.lint]
  select = [ "E", "F", "UP", "B", "SIM", "I" ]
  ignore = [ ]
  fixable = [ "ALL" ]
  unfixable = [ ]

[tool.uv.sources]
wealth-management-portal-common-market-events = { workspace = true }

[project]
name = "wealth_management_portal.api"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
  "fastapi==0.128.5",
  "mangum==0.21.0",
  "aws-lambda-powertools==3.24.0",
  "aws-lambda-powertools[tracer]==3.24.0",
  "wealth_management_portal.portfolio_data_access",
  "python-dotenv>=1.2.1",
  "wealth-management-portal-common-market-events",
]

[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[dependency-groups]
dev = [ "fastapi[standard]==0.128.5" ]
