[dependency-groups]
dev = [
  "black>=26.1.0",
  "ruff>=0.8.2",
  "autopep8>=2.3.1",
  "pytest>=8.3.4",
  "pytest-sugar>=1.0.0",
  "pytest-cov>=6.0.0",
  "pytest-html>=4.1.1",
  "pytest-asyncio>=0.21.0",
  "sqlalchemy>=1.4,<2.0"
]

# Formatter and linter configuration — pinned to prevent drift across environments
[tool.ruff]
line-length = 120

[tool.ruff.format]
quote-style = "double"

[tool.black]
line-length = 120
