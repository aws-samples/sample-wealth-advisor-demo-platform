[project]
name = "nx-workspace"
version = "1.0.0"
dependencies = [
  "wealth_management_portal.common_auth",
  "wealth_management_portal.api",
  "wealth_management_portal.client_search",
  "wealth_management_portal.common_market_events",
  "wealth_management_portal.email_sender_mcp",
  "wealth_management_portal.graph_search_api",
  "wealth_management_portal.graph_search_engine",
  "wealth_management_portal.intelligence_api",
  "wealth_management_portal.market_events_coordinator",
  "wealth_management_portal.market_intelligence_chat",
  "wealth_management_portal.neptune_analytics_core",
  "wealth_management_portal.neptune_analytics_server",
  "wealth_management_portal.portfolio_data_access",
  "wealth_management_portal.portfolio_data_server",
