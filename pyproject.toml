  "wealth_management_portal.scheduler_mcp",
  "wealth_management_portal.scheduler_tools",
  "wealth_management_portal.web_crawler"
]

[tool.uv.workspace]
members = [
  "packages/common_auth",
  "packages/api",
  "packages/client_search",
  "packages/common_market_events/common_market_events",
  "packages/graph_search_api",
  "packages/graph_search_engine",
