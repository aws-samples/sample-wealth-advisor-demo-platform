  "packages/portfolio_data_server",
  "packages/redshift_data_access",
  "packages/report",
  "packages/scheduler_mcp",
  "packages/scheduler-tools/scheduler_tools",
  "packages/web_crawler",
  "packages/email_sender_mcp",
  "packages/scheduler_executor"
]

